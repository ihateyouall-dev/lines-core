name: Format

on:
  push:
  pull_request:
    
jobs:
  Format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install clang-format
        run: |
            sudo apt-get update
            sudo apt-get install -y clang-format
            
      - name: Run clang-format
        run: |
          files=$(git ls-files '*.cpp' '*.hpp' '*.h')
          clang-format --dry-run --Werror $files
