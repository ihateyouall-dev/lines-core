name: Build

on:
  push:
  pull_request:

jobs:
  Linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [debug-gcc, debug-clang]

    steps:
      - uses: actions/checkout@v6

      - name: Install libc++
        if: matrix.preset == 'debug-clang'
        run: | 
          sudo apt-get update
          sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
  macOS:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake --preset debug-clang

      - name: Build
        run: cmake --build --preset debug-clang

      - name: Test
        run: ctest --preset debug-clang
  Windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Configure
        run: cmake --preset debug-msvc

      - name: Build
        run: cmake --build --preset debug-msvc

      - name: Test
        run: ctest --preset debug-msvc
